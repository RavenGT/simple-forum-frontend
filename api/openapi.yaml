openapi: 3.0.3
info:
  title: Simple Reddit API
  version: 1.0.0

paths:
  /api/posts:
    get:
      summary: Get all posts
      tags: [Posts]
      responses:
        '200':
          description: List of posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PostResponse'
    post:
      summary: Create a post
      tags: [Posts]
      parameters:
        - $ref: '#/components/parameters/userId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostRequest'
      responses:
        '201':
          description: Post created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostResponse'
        '404':
          description: Forum not found

  /api/posts/{id}:
    get:
      summary: Get a post by ID
      tags: [Posts]
      parameters:
        - $ref: '#/components/parameters/postId'
      responses:
        '200':
          description: Post found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostResponse'
        '404':
          description: Post not found
    put:
      summary: Update a post
      tags: [Posts]
      parameters:
        - $ref: '#/components/parameters/postId'
        - $ref: '#/components/parameters/userId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PostRequest'
      responses:
        '200':
          description: Post updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostResponse'
        '404':
          description: Post or forum not found
    delete:
      summary: Delete a post
      tags: [Posts]
      parameters:
        - $ref: '#/components/parameters/postId'
        - $ref: '#/components/parameters/userId'
      responses:
        '204':
          description: Post deleted
        '404':
          description: Post not found

  /api/posts/{id}/upvote:
    post:
      summary: Upvote a post
      tags: [Votes]
      parameters:
        - $ref: '#/components/parameters/postId'
        - $ref: '#/components/parameters/userId'
      responses:
        '200':
          description: Vote recorded
        '404':
          description: Post not found

  /api/posts/{id}/downvote:
    post:
      summary: Downvote a post
      tags: [Votes]
      parameters:
        - $ref: '#/components/parameters/postId'
        - $ref: '#/components/parameters/userId'
      responses:
        '200':
          description: Vote recorded
        '404':
          description: Post not found

  /api/forums:
    get:
      summary: Get all forums
      tags: [Forums]
      responses:
        '200':
          description: List of forums
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ForumResponse'
    post:
      summary: Create a forum
      tags: [Forums]
      parameters:
        - $ref: '#/components/parameters/userId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForumRequest'
      responses:
        '201':
          description: Forum created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForumResponse'
        '409':
          description: Forum name already taken

  /api/forums/{name}:
    get:
      summary: Get a forum by name
      tags: [Forums]
      parameters:
        - $ref: '#/components/parameters/forumName'
      responses:
        '200':
          description: Forum found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForumResponse'
        '404':
          description: Forum not found
    put:
      summary: Update a forum
      tags: [Forums]
      parameters:
        - $ref: '#/components/parameters/forumName'
        - $ref: '#/components/parameters/userId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForumRequest'
      responses:
        '200':
          description: Forum updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForumResponse'
        '404':
          description: Forum not found
    delete:
      summary: Delete a forum
      tags: [Forums]
      parameters:
        - $ref: '#/components/parameters/forumName'
        - $ref: '#/components/parameters/userId'
      responses:
        '204':
          description: Forum deleted (posts, votes, and subscriptions cascade-deleted)
        '404':
          description: Forum not found

  /api/forums/{name}/posts:
    get:
      summary: Get all posts in a forum
      tags: [Forums]
      parameters:
        - $ref: '#/components/parameters/forumName'
      responses:
        '200':
          description: List of posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PostResponse'
        '404':
          description: Forum not found

  /api/forums/{name}/subscribe:
    post:
      summary: Subscribe to a forum
      tags: [Subscriptions]
      parameters:
        - $ref: '#/components/parameters/forumName'
        - $ref: '#/components/parameters/userId'
      responses:
        '204':
          description: Subscribed (idempotent - no-op if already subscribed)
        '404':
          description: Forum not found
    delete:
      summary: Unsubscribe from a forum
      tags: [Subscriptions]
      parameters:
        - $ref: '#/components/parameters/forumName'
        - $ref: '#/components/parameters/userId'
      responses:
        '204':
          description: Unsubscribed
        '404':
          description: Forum not found

  /api/users/me/subscriptions:
    get:
      summary: Get all forums the authenticated user is subscribed to
      tags: [Subscriptions]
      parameters:
        - $ref: '#/components/parameters/userId'
      responses:
        '200':
          description: List of subscribed forums
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ForumResponse'

  /api/comments:
    post:
      summary: Create a comment
      tags: [Comments]
      parameters:
        - $ref: '#/components/parameters/userId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentRequest'
      responses:
        '201':
          description: Comment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentResponse'
        '400':
          description: postId missing
        '404':
          description: Post not found
    get:
      summary: List all comments for a post (newest-first)
      tags: [Comments]
      parameters:
        - name: postId
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CommentResponse'
        '400':
          description: postId missing
        '404':
          description: Post not found

  /api/comments/{id}:
    get:
      summary: Get a comment by ID
      tags: [Comments]
      parameters:
        - $ref: '#/components/parameters/commentId'
      responses:
        '200':
          description: Comment found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentResponse'
        '404':
          description: Comment not found
    put:
      summary: Update a comment
      tags: [Comments]
      parameters:
        - $ref: '#/components/parameters/commentId'
        - $ref: '#/components/parameters/userId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommentRequest'
      responses:
        '200':
          description: Comment updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentResponse'
        '403':
          description: Not the author
        '404':
          description: Comment not found
    delete:
      summary: Delete a comment (cascade-deletes its votes)
      tags: [Comments]
      parameters:
        - $ref: '#/components/parameters/commentId'
        - $ref: '#/components/parameters/userId'
      responses:
        '204':
          description: Comment deleted
        '403':
          description: Not the author
        '404':
          description: Comment not found

  /api/comments/{id}/upvote:
    post:
      summary: Upvote a comment
      tags: [Votes]
      parameters:
        - $ref: '#/components/parameters/commentId'
        - $ref: '#/components/parameters/userId'
      responses:
        '200':
          description: Vote recorded
        '404':
          description: Comment not found

  /api/comments/{id}/downvote:
    post:
      summary: Downvote a comment
      tags: [Votes]
      parameters:
        - $ref: '#/components/parameters/commentId'
        - $ref: '#/components/parameters/userId'
      responses:
        '200':
          description: Vote recorded
        '404':
          description: Comment not found

components:
  parameters:
    userId:
      name: X-User-Id
      in: header
      required: true
      schema:
        type: string
    postId:
      name: id
      in: path
      required: true
      schema:
        type: string
    forumName:
      name: name
      in: path
      required: true
      schema:
        type: string
    commentId:
      name: id
      in: path
      required: true
      schema:
        type: string

  schemas:
    PostRequest:
      type: object
      required: [title, content, forumName]
      properties:
        title:
          type: string
        content:
          type: string
        forumName:
          type: string

    PostResponse:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        content:
          type: string
        userId:
          type: string
        forumName:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        upvoteCount:
          type: integer
        downvoteCount:
          type: integer
        commentCount:
          type: integer

    ForumRequest:
      type: object
      required: [name, description]
      properties:
        name:
          type: string
        description:
          type: string

    ForumResponse:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        createdBy:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        subscriberCount:
          type: integer

    CommentRequest:
      type: object
      required: [postId, content]
      properties:
        postId:
          type: string
        content:
          type: string

    CommentResponse:
      type: object
      properties:
        id:
          type: string
        postId:
          type: string
        parentCommentId:
          type: string
          nullable: true
        content:
          type: string
        userId:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        upvoteCount:
          type: integer
        downvoteCount:
          type: integer
